name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag version
        shell: bash
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$GITHUB_REF_NAME" != "$manifest_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $manifest_version"
            exit 1
          fi
          if ! [[ "$GITHUB_REF_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use the x.y.z format"
            exit 1
          fi

      - name: Prepare release notes
        run: node scripts/extract-release-notes.mjs "$GITHUB_REF_NAME" > release-notes.md

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Attest release assets
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/main.js
            dist/styles.css

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "Mermaid Lens $GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            dist/main.js \
            dist/manifest.json \
            dist/styles.css
